<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<link rel="icon" href="favicon.svg" type="image/svg+xml" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/lithium-typeface-lt" rel="stylesheet">
<link rel="stylesheet" href="fonts/destine.css">
<link rel="stylesheet" href="css/site-shared.css?v=20260635">
<script src="js/page-transition.js?v=20260633"></script>
<link rel="stylesheet" href="fonts/sora.css">
<link href="https://fonts.googleapis.com/css2?family=Sora:ital,wght@1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<title>Visual Craft · Neda Bagheri</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff; --surface: #FFFFFF; --dark: #1A1A1A; --mid: #555555; --light: #999999;
    --accent: #C4622D; --accent-light: #F5EBE3; --border: #E8E4DC;
    --bg2: #EFECE6; --line: #E8E4DC; --ink: #1A1A1A; --ink2: #555555; --ink3: #A8A299; --warm: #C4622D;
    --display: 'Lithium Typeface (LT)', 'Playfair Display', Georgia, serif; --serif: var(--display); --sans: 'Open Sans', sans-serif;
    --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { color-scheme: light; overflow-x: clip; }
  body { font-family: var(--sans); background: #ffffff; color: var(--dark); font-size: 16px; line-height: 1.7; overflow-x: hidden; position: relative; }
  body.hero-cursor-none { cursor: none; }
img, video { max-width: 100%; height: auto; }

  /* ── NAV (matches about.html) ── */
a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  /* ── CUSTOM CURSOR (matches about.html) ── */
  #dot {
    position: fixed; z-index: 9999; pointer-events: none;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--warm); transform: translate(-50%, -50%); mix-blend-mode: multiply;
  }
  #ring {
    position: fixed; z-index: 9998; pointer-events: none;
    width: 36px; height: 36px; border-radius: 50%;
    border: 1.5px solid rgba(200, 98, 42, 0.3); transform: translate(-50%, -50%);
    transition: width 0.35s, height 0.35s, border-color 0.3s;
  }
  body.lh #dot { transform: translate(-50%, -50%) scale(2); opacity: 0.5; }
  body.lh #ring { width: 60px; height: 60px; border-color: rgba(200, 98, 42, 0.5); }

  /* ── PAGE LAYOUT ── */
  main {
    max-width: 1160px;
    margin: 0 auto;
    padding: 72px 48px 100px;
  }

  /* ── HERO ── */
  .vc-hero { max-width: 760px; margin: 0 auto 72px; text-align: left; }
  .sec-label {
    font-size: 10px; font-weight: 600; color: var(--ink3);
    letter-spacing: 0.16em; text-transform: uppercase;
    display: flex; align-items: center; gap: 12px;
  }
  .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }
  .vc-hero .sec-label { margin-bottom: 24px; }
  .vc-hero h1 {
    font-family: var(--page-title);
    font-size: clamp(40px, 4.2vw, 60px);
    line-height: 1.1; margin-bottom: 20px; color: #000;
    font-weight: 400; letter-spacing: -0.003em;
  }
  .vc-hero h1 em { font-style: normal; color: inherit; font-weight: 400; }
  .vc-hero .lead {
    font-size: 18px; color: var(--mid); font-weight: 300;
    line-height: 1.6; max-width: 620px;
  }

  /* ── GALLERY SECTION ── */
  .vc-section { margin-top: clamp(56px, 8vw, 88px); }
  .vc-section + .vc-section { margin-top: clamp(64px, 9vw, 96px); }
  .vc-section__head {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 28px;
  }
  .vc-section__num {
    font-family: var(--serif);
    font-size: 10px; font-weight: 600; color: var(--ink3);
    letter-spacing: 0.16em; text-transform: uppercase;
    display: flex; align-items: center; gap: 12px;
  }
  .vc-section__num::after { content: ''; flex: 1; height: 1px; background: var(--line); max-width: 96px; }
  .vc-section h2 {
    font-family: var(--page-title);
    font-size: clamp(40px, 4.2vw, 60px);
    font-weight: 400; color: #000;
    letter-spacing: -0.003em; line-height: 1.1;
  }

  /* ── HORIZONTAL SCROLLER ── */
  .vc-scroller-wrap { position: relative; }
  .vc-scroller-wrap::before,
  .vc-scroller-wrap::after {
    content: ''; position: absolute; top: 0; bottom: 10px; width: 56px;
    pointer-events: none; z-index: 2;
    transition: opacity 0.3s var(--ease-soft);
  }
  .vc-scroller-wrap::before {
    left: 0;
    background: linear-gradient(to right, var(--bg) 10%, rgba(247,245,240,0));
  }
  .vc-scroller-wrap::after {
    right: 0;
    background: linear-gradient(to left, var(--bg) 10%, rgba(247,245,240,0));
  }
  .vc-scroller-wrap[data-at-start="true"]::before { opacity: 0; }
  .vc-scroller-wrap[data-at-end="true"]::after { opacity: 0; }

  .vc-scroller {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: clamp(240px, 28vw, 320px);
    gap: 18px;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 10px;
  }
  .vc-scroller::-webkit-scrollbar { display: none; }

  /* ── CARD ── (static, non-clickable gallery item) */
  .vc-card {
    position: relative;
    display: block;
    margin: 0;                 /* reset default <figure> margin */
    aspect-ratio: 1 / 1;
    border-radius: 14px;
    overflow: hidden;
    background: var(--bg2);
    border: 1px solid var(--line);
    cursor: default;
    scroll-snap-align: start;
    isolation: isolate;
    transition: transform 0.45s var(--ease-spring),
                box-shadow 0.45s var(--ease-soft),
                border-color 0.3s var(--ease-soft);
    will-change: transform;
  }
  .vc-card::before {
    /* empty-state pattern, only visible when no image is set */
    content: '';
    position: absolute; inset: 0; z-index: 0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(196,98,45,0.16) 1px, transparent 0);
    background-size: 14px 14px;
    opacity: 0.45;
  }
  .vc-card[data-has-image="true"]::before { opacity: 0; }
  /* Cards displaying images already pre-padded against their own backdrop
     get a soft neutral fill so any "contain" letterboxing reads as design,
     not as a gap. */
  .vc-card[data-has-image="true"] { background: #ECEAE4; }
  /* Opt-in dark letterbox for cards whose source already lives on black
     (e.g. event posters). Specificity beats the neutral rule above. */
  .vc-card[data-has-image="true"].vc-card--bg-dark { background: #000; }
  /* Opt-in white letterbox for cards whose source sits on transparent or
     near-white (e.g. flat illustrations). Flips the bottom veil gradient
     and title color so the caption stays readable against light imagery. */
  .vc-card[data-has-image="true"].vc-card--bg-light { background: #ffffff; }
  .vc-card--bg-light .vc-card__veil {
    background: linear-gradient(
      to top,
      rgba(255,255,255,0.86) 0%,
      rgba(255,255,255,0.62) 28%,
      rgba(255,255,255,0.24) 58%,
      rgba(255,255,255,0)    100%
    );
  }
  .vc-card--bg-light .vc-card__title {
    color: var(--ink);
    text-shadow: 0 1px 8px rgba(255,255,255,0.55);
  }
  .vc-card__img {
    position: absolute; inset: 0; z-index: 1;
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    display: block;
    /* Hint browsers to preserve edge contrast when downscaling logos.
       Falls back to default high-quality bilinear sampling everywhere else. */
    image-rendering: -webkit-optimize-contrast;
    transform: translateZ(0);
    backface-visibility: hidden;
    transition: transform 0.7s var(--ease-spring), filter 0.4s var(--ease-soft);
  }
  /* Use --contain on cards whose source already includes whitespace
     (mockups, wide wordmarks) so the full logo stays visible. */
  .vc-card--contain .vc-card__img { object-fit: contain; }
  .vc-card__veil {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 2;
    height: 55%;
    background: linear-gradient(
      to top,
      rgba(0,0,0,0.62) 0%,
      rgba(0,0,0,0.42) 28%,
      rgba(0,0,0,0.18) 58%,
      rgba(0,0,0,0) 100%
    );
    pointer-events: none;
    opacity: 0.95;
    transition: opacity 0.4s var(--ease-soft), height 0.4s var(--ease-soft);
  }
  .vc-card__title {
    position: absolute; left: 18px; right: 18px; bottom: 16px; z-index: 3;
    font-family: var(--serif);
    font-size: 13px; font-weight: 500; line-height: 1.35;
    color: #ffffff;
    letter-spacing: 0.005em;
    text-shadow: 0 1px 8px rgba(0,0,0,0.35);
    transition: transform 0.45s var(--ease-spring);
  }
  .vc-card__hint {
    /* empty-state label, hidden when image is present */
    position: absolute; left: 0; right: 0; bottom: 16px; z-index: 3;
    text-align: center;
    font-family: var(--serif);
    font-size: 10px; font-weight: 600;
    color: var(--ink3); letter-spacing: 0.14em; text-transform: uppercase;
    opacity: 0.7;
  }
  .vc-card[data-has-image="true"] .vc-card__hint { display: none; }

  .vc-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 38px rgba(26, 26, 26, 0.12);
    border-color: rgba(196, 98, 45, 0.35);
  }
  .vc-card:hover .vc-card__img { transform: scale(1.045); }
  .vc-card:hover .vc-card__veil { opacity: 1; height: 62%; }
  .vc-card:hover .vc-card__title { transform: translateY(-2px); }

  /* ── LINKED CARD SECTIONS ──
     Shared modifier for sections whose tiles use a 4:3 horizontal layout
     (vs. the default 1:1 squares) with slightly wider scroller tracks.
     Currently used by: Print & Packaging, Motion Campaigns. Illustrations
     keeps the default 1:1 layout, so it does NOT use this modifier — but
     its anchor cards still pick up the interactive resets / focus styling
     defined below (which are now element-keyed, not section-keyed). */
  .vc-section--linked .vc-scroller { grid-auto-columns: clamp(300px, 36vw, 400px); }
  .vc-section--linked .vc-card { aspect-ratio: 4 / 3; }

  /* ── INTERACTIVE CARD RESETS ──
     Applies to every clickable card regardless of section, so anchor and
     button cards behave identically and gain the same focus affordance.
     Anchor reset: drop link underline / color so the title styling wins. */
  a.vc-card {
    text-decoration: none;
    color: inherit;
    cursor: inherit;            /* let body's custom cursor flow through */
  }
  /* Button-as-card reset: strip UA defaults so a <button> tile is
     pixel-identical to an <a> tile. */
  button.vc-card {
    padding: 0;
    font: inherit;
    text-align: left;
    width: 100%;
    color: inherit;
  }
  /* Keyboard focus mirrors the hover affordance for any interactive card. */
  a.vc-card:focus-visible,
  button.vc-card:focus-visible {
    transform: translateY(-4px);
    box-shadow: 0 18px 38px rgba(26, 26, 26, 0.12);
    border-color: rgba(196, 98, 45, 0.35);
    outline: none;
  }
  a.vc-card:focus-visible .vc-card__img,
  button.vc-card:focus-visible .vc-card__img { transform: scale(1.045); }
  a.vc-card:focus-visible .vc-card__veil,
  button.vc-card:focus-visible .vc-card__veil { opacity: 1; height: 62%; }
  a.vc-card:focus-visible .vc-card__title,
  button.vc-card:focus-visible .vc-card__title { transform: translateY(-2px); }

  /* ── LIGHTBOX ──
     Minimal image viewer triggered by [data-lightbox-src] cards.
     Backdrop fades in, image scales up. ESC / click backdrop / click X to close. */
  .lightbox {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: clamp(20px, 4vw, 56px);
    background: rgba(15, 14, 12, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.32s var(--ease-soft), visibility 0s linear 0.32s;
  }
  .lightbox[data-open="true"] {
    opacity: 1;
    visibility: visible;
    transition: opacity 0.32s var(--ease-soft), visibility 0s;
  }
  .lightbox__figure {
    margin: 0;
    max-width: min(1280px, 100%);
    max-height: 100%;
    display: flex; flex-direction: column; align-items: center;
    gap: 16px;
    transform: scale(0.96);
    transition: transform 0.4s var(--ease-spring);
  }
  .lightbox[data-open="true"] .lightbox__figure { transform: scale(1); }
  .lightbox__img {
    max-width: 100%;
    max-height: calc(100vh - clamp(120px, 14vw, 200px));
    object-fit: contain;
    display: block;
    border-radius: 8px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    background: #000;             /* matches the dark-bg poster cards so any letterboxing disappears */
  }
  .lightbox__caption {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.78);
    letter-spacing: 0.01em;
    text-align: center;
    max-width: 60ch;
  }
  .lightbox__close {
    position: absolute;
    top: clamp(14px, 2vw, 24px);
    right: clamp(14px, 2vw, 24px);
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.22);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s var(--ease-soft), border-color 0.2s var(--ease-soft), transform 0.2s var(--ease-spring);
  }
  .lightbox__close:hover,
  .lightbox__close:focus-visible {
    background: rgba(255, 255, 255, 0.16);
    border-color: rgba(255, 255, 255, 0.45);
    transform: rotate(90deg);
    outline: none;
  }
  .lightbox__close svg { width: 18px; height: 18px; flex-shrink: 0; }
  body.lightbox-open { overflow: hidden; }

  /* ── REVEAL ── */
  .reveal {
    opacity: 0; transform: translateY(22px);
    transition: opacity 0.7s var(--ease-soft), transform 0.7s var(--ease-spring);
  }
  .reveal.is-visible { opacity: 1; transform: translateY(0); }

  /* ── FOOTER (matches about.html) ── */
.footer-social li { perspective: 500px; }
  .footer-social a {
    display: inline-flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: 8px;
    border: 1px solid var(--border); color: var(--mid); background: var(--surface);
    text-decoration: none; transform-style: preserve-3d;
    transition: color 0.3s var(--ease-soft), border-color 0.3s var(--ease-soft),
                background 0.3s var(--ease-soft), transform 0.35s var(--ease-spring),
                box-shadow 0.35s var(--ease-soft);
  }
  .footer-social a:hover {
    color: var(--accent); border-color: var(--accent); background: var(--accent-light);
    transform: translateY(-4px) rotateX(10deg);
    box-shadow: 0 12px 26px rgba(26, 26, 26, 0.1);
  }
  .footer-social a:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 3px;
    transform: translateY(-3px) rotateX(6deg);
    box-shadow: 0 10px 22px rgba(26, 26, 26, 0.08);
  }
  .footer-social a:active { transform: translateY(-1px) rotateX(3deg) scale(0.96); transition-duration: 0.1s; }
  .footer-social svg { width: 20px; height: 20px; flex-shrink: 0; }
  .footer-social__beh svg { width: 18px; height: 18px; }

  /* ── REDUCED MOTION ── */
  @media (prefers-reduced-motion: reduce) {
    body.hero-cursor-none { cursor: auto; }
    #dot, #ring { display: none !important; }
    .n-links a:not(.n-btn), .n-btn, .footer-social a,
    .vc-card, .vc-card__img, .vc-card__veil, .vc-card__title {
      transition: none !important;
    }
    .reveal, .reveal.is-visible {
      opacity: 1 !important; transform: none !important; transition: none !important;
    }
    .vc-scroller { scroll-behavior: auto; }
    .vc-card:hover { transform: none; box-shadow: none; }
    .vc-card:hover .vc-card__img { transform: none; }
    .vc-card:hover .vc-card__veil { height: 55%; opacity: 0.95; }
    .vc-card:hover .vc-card__title { transform: none; }
    a.vc-card:focus-visible,
    button.vc-card:focus-visible { transform: none; box-shadow: none; }
    a.vc-card:focus-visible .vc-card__img,
    button.vc-card:focus-visible .vc-card__img { transform: none; }
    a.vc-card:focus-visible .vc-card__veil,
    button.vc-card:focus-visible .vc-card__veil { height: 55%; opacity: 0.95; }
    a.vc-card:focus-visible .vc-card__title,
    button.vc-card:focus-visible .vc-card__title { transform: none; }
    .lightbox, .lightbox__figure, .lightbox__close { transition: none !important; }
    .lightbox[data-open="true"] .lightbox__figure { transform: none; }
    .lightbox__close:hover, .lightbox__close:focus-visible { transform: none; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    main { padding: 56px 32px 80px; }
    .vc-scroller { grid-auto-columns: clamp(220px, 60vw, 280px); gap: 14px; }
    .vc-section--linked .vc-scroller { grid-auto-columns: clamp(280px, 68vw, 360px); }
    .vc-scroller-wrap::before, .vc-scroller-wrap::after { width: 36px; }
  }
main { padding: 48px 20px 72px; }
    .vc-section__head { gap: 8px; margin-bottom: 22px; }
    .vc-scroller { grid-auto-columns: 72vw; gap: 12px; padding-right: 20px; }
    .vc-section--linked .vc-scroller { grid-auto-columns: 82vw; }
    .vc-scroller-wrap::before, .vc-scroller-wrap::after { width: 24px; }
    footer { padding: 24px; flex-direction: column; align-items: flex-start; gap: 20px; }
  }
  )();

/* Custom cursor */
(function () {
  var dot = document.getElementById('dot');
  var ring = document.getElementById('ring');
  if (!dot || !ring) return;
  var reduce = false;
  try { reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e1) {}
  if (reduce) {
    dot.style.display = 'none'; ring.style.display = 'none';
    document.body.classList.remove('hero-cursor-none'); return;
  }
  var mx = window.innerWidth / 2, my = window.innerHeight / 2;
  var rx = mx, ry = my;
  dot.style.left = mx + 'px'; dot.style.top = my + 'px';
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  document.addEventListener('mousemove', function (e) {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px'; dot.style.top = my + 'px';
  });
  (function ar() {
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(ar);
  })();
  document.querySelectorAll('a, button').forEach(function (el) {
    el.addEventListener('mouseenter', function () { document.body.classList.add('lh'); });
    el.addEventListener('mouseleave', function () { document.body.classList.remove('lh'); });
  });
})();

/* Horizontal scroller: edge fade gradient state */
(function () {
  document.querySelectorAll('.vc-scroller-wrap').forEach(function (wrap) {
    var scroller = wrap.querySelector('.vc-scroller');
    if (!scroller) return;
    function updateState() {
      var max = scroller.scrollWidth - scroller.clientWidth;
      var x = scroller.scrollLeft;
      wrap.setAttribute('data-at-start', x <= 2 ? 'true' : 'false');
      wrap.setAttribute('data-at-end', (max <= 2 || x >= max - 2) ? 'true' : 'false');
    }
    scroller.addEventListener('scroll', updateState, { passive: true });
    window.addEventListener('resize', updateState);
    updateState();
  });
})();

/* Image lightbox: any element with [data-lightbox-src] opens a full-screen
   image viewer. Close via ESC, backdrop click, or the close button. Focus is
   trapped while open and restored to the trigger on close. */
(function () {
  var lightbox = document.getElementById('lightbox');
  if (!lightbox) return;
  var img = lightbox.querySelector('.lightbox__img');
  var caption = lightbox.querySelector('.lightbox__caption');
  var closeBtn = lightbox.querySelector('.lightbox__close');
  var lastTrigger = null;

  function open(trigger) {
    var src = trigger.getAttribute('data-lightbox-src');
    if (!src) return;
    lastTrigger = trigger;
    img.src = src;
    img.alt = trigger.getAttribute('data-lightbox-alt') || '';
    var cap = trigger.getAttribute('data-lightbox-caption') || '';
    caption.textContent = cap;
    caption.style.display = cap ? '' : 'none';
    lightbox.setAttribute('data-open', 'true');
    lightbox.setAttribute('aria-hidden', 'false');
    document.body.classList.add('lightbox-open');
    /* Defer focus so the dialog has applied its visibility transition. */
    requestAnimationFrame(function () { closeBtn.focus(); });
  }

  function close() {
    lightbox.setAttribute('data-open', 'false');
    lightbox.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('lightbox-open');
    /* Clear src after the transition so the next open feels instant
       and the previous image isn't briefly visible during fade-in. */
    setTimeout(function () {
      if (lightbox.getAttribute('data-open') !== 'true') {
        img.removeAttribute('src');
        img.alt = '';
      }
    }, 340);
    if (lastTrigger && typeof lastTrigger.focus === 'function') {
      lastTrigger.focus();
    }
    lastTrigger = null;
  }

  document.addEventListener('click', function (e) {
    var trigger = e.target.closest('[data-lightbox-src]');
    if (trigger) {
      e.preventDefault();
      open(trigger);
    }
  });

  closeBtn.addEventListener('click', close);

  /* Click on backdrop closes; click on figure (image/caption) does not. */
  lightbox.addEventListener('click', function (e) {
    if (e.target === lightbox) close();
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && lightbox.getAttribute('data-open') === 'true') {
      close();
    }
  });
})();
</script>

</body>
