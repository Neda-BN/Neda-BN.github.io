<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg2:         #f0ede8;
  --ink:         #1a1814;
  --ink2:        #6b6760;
  --ink3:        #9e9b96;
  --warm:        #3B82F6;
  --line:        rgba(26,24,20,0.09);
  --surface:     #FFFFFF;
  --dark:        var(--ink);
  --mid:         var(--ink2);
  --light:       var(--ink3);
  --accent:      var(--warm);
  --accent-light:#F5EBE3;
  --border:      #E8E4DC;
  --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-soft:   cubic-bezier(0.4, 0, 0.2, 1);
}

html { color-scheme: light; overflow-x: clip; }
html, body {
  background: #ffffff;
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body { font-size: 16px; line-height: 1.7; }
body.hero-cursor-none { cursor: none; }
img { max-width: 100%; height: auto; display: block; }
a:focus-visible { outline: 2px solid var(--warm); outline-offset: 3px; }
.footer-strip a:focus-visible { outline-color: #fff; }

/* ── NAV (matches index.html / about.html) ── */
/* ── CUSTOM CURSOR (matches index.html / visual-craft.html) ── */
#dot {
  position: fixed; z-index: 9999; pointer-events: none;
  width: 8px; height: 8px; border-radius: 50%; background: var(--warm);
  transform: translate(-50%, -50%); mix-blend-mode: multiply;
}
#ring {
  position: fixed; z-index: 9998; pointer-events: none;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid rgba(59, 130, 246,0.3);
  transform: translate(-50%, -50%);
  transition: width 0.35s, height 0.35s, border-color 0.3s;
}
body.lh #dot { transform: translate(-50%, -50%) scale(2); opacity: 0.5; }
body.lh #ring { width: 60px; height: 60px; border-color: rgba(59, 130, 246, 0.5); }

/* ── PROJECT DETAIL LAYOUT ── */
main {
  max-width: 960px;
  margin: 0 auto;
  padding: 120px 48px 96px;
}

.ui-detail__back {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--display);
  font-size: 12px; font-weight: 500;
  color: var(--ink2);
  text-decoration: none;
  letter-spacing: 0.04em;
  margin-bottom: 44px;
  transition: color 0.3s var(--ease-soft), gap 0.3s var(--ease-spring);
}
.ui-detail__back::before {
  content: '←';
  font-size: 14px; line-height: 1;
  transition: transform 0.3s var(--ease-spring);
}
.ui-detail__back:hover,
.ui-detail__back:focus-visible { color: var(--accent); gap: 12px; }
.ui-detail__back:hover::before,
.ui-detail__back:focus-visible::before { transform: translateX(-4px); }

.ui-detail__eyebrow {
  font-family: var(--display);
  font-size: 10px; font-weight: 600;
  color: var(--light);
  letter-spacing: 0.16em; text-transform: uppercase;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px;
}
.ui-detail__eyebrow::after {
  content: ''; flex: 1; height: 1px; background: var(--border); max-width: 96px;
}

.ui-detail__title {
  font-family: var(--page-title);
  font-size: clamp(32px, 4.6vw, 52px);
  font-weight: 400;
  color: #000000;
  line-height: 1.1;
  letter-spacing: -0.022em;
  margin-bottom: 44px;
  opacity: 0;
  animation: ui-detail-fade 0.65s var(--ease-soft) 0.05s forwards;
}

.ui-detail__featured {
  margin: 0;
  border-radius: 14px;
  overflow: hidden;
  background: #ECEAE4;
  border: 1px solid var(--line);
  opacity: 0;
  transform: translateY(18px);
  animation: ui-detail-rise 0.75s var(--ease-spring) 0.15s forwards;
}
/* Stack additional featured images below the first with consistent breathing room. */
.ui-detail__featured + .ui-detail__featured { margin-top: clamp(24px, 3.5vw, 40px); }
/* Cascade the reveal so each figure rises in shortly after the previous one. */
.ui-detail__featured:nth-of-type(2) { animation-delay: 0.28s; }
.ui-detail__featured:nth-of-type(3) { animation-delay: 0.41s; }
.ui-detail__featured:nth-of-type(4) { animation-delay: 0.54s; }
.ui-detail__featured:nth-of-type(n+5) { animation-delay: 0.66s; }
.ui-detail__featured img {
  width: 100%;
  height: auto;
  display: block;
  image-rendering: -webkit-optimize-contrast;
  transform: translateZ(0);
  backface-visibility: hidden;
}

@keyframes ui-detail-fade { to { opacity: 1; } }
@keyframes ui-detail-rise { to { opacity: 1; transform: none; } }


/* ── REDUCED MOTION ── */
@media (prefers-reduced-motion: reduce) {
  body.hero-cursor-none { cursor: auto; }
  #dot, #ring { display: none !important; }
  .n-links a:not(.n-btn), .n-btn, .footer-social a, .ui-detail__back,
  .ui-detail__featured img { transition: none !important; }
  .ui-detail__title, .ui-detail__featured {
    opacity: 1 !important; transform: none !important; animation: none !important;
  }
  .ui-detail__back:hover, .ui-detail__back:focus-visible { gap: 8px; }
  .ui-detail__back:hover::before, .ui-detail__back:focus-visible::before { transform: none; }
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
main { padding: 104px 24px 80px; }
  .ui-detail__back { margin-bottom: 36px; }
  .ui-detail__title { margin-bottom: 32px; }
}
@media (max-width: 680px) {
  main { padding: 88px 20px 64px; }
  .ui-detail__title { margin-bottom: 28px; }
  .footer-strip { padding: 56px 20px 72px; }
  footer { padding: 24px; flex-direction: column; align-items: flex-start; gap: 20px; }
}
/* ── ILLUSTRATION PROJECT PAGE OVERRIDE ──
   Smaller, centered, more subtle title above a ~1.5x smaller centered hero
   (640px max vs. the default 960px main slot). Inherits everything else
   from the shared rules above: fade-in animation, reduced-motion handling,
   and responsive paddings (figure shrinks naturally on narrow viewports
   because max-width: 640px gives way to content width when smaller). */
.ui-detail__title {
  text-align: center;
  font-size: clamp(20px, 2.2vw, 28px);
  font-weight: 400;
  font-style: normal;
  letter-spacing: -0.02em;
  color: #000000;
  white-space: nowrap;
}
.ui-detail__featured {
  max-width: 640px;
  margin-inline: auto;
}
</style>

<script>
(function () {
  var dot = document.getElementById('dot');
  var ring = document.getElementById('ring');
  if (!dot || !ring) return;
  var reduce = false;
  try { reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e1) {}
  if (reduce) {
    dot.style.display = 'none'; ring.style.display = 'none';
    document.body.classList.remove('hero-cursor-none'); return;
  }
  var mx = window.innerWidth / 2, my = window.innerHeight / 2;
  var rx = mx, ry = my;
  dot.style.left = mx + 'px'; dot.style.top = my + 'px';
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  document.addEventListener('mousemove', function (e) {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px'; dot.style.top = my + 'px';
  });
  (function ar() {
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(ar);
  })();
  document.querySelectorAll('a, button').forEach(function (el) {
    el.addEventListener('mouseenter', function () { document.body.classList.add('lh'); });
    el.addEventListener('mouseleave', function () { document.body.classList.remove('lh'); });
  });
})();
</script>
